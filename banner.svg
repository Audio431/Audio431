<svg fill="none" viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .canvas {
          width: 1440px;
          height: 320px;
          background-color: #000000;
          display: flex;
          position: relative;
          overflow: hidden;
          font-family: Helvetica, Arial, sans-serif;
        }

        .grid {
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 100%;
          opacity: 0;
          animation: gridFadeIn 1.8s ease forwards 0.2s;
        }
        .gv {
          position: absolute; top: 0;
          width: 1px; height: 100%;
          background: rgba(255,255,255,0.05);
        }
        .gh {
          position: absolute; left: 0;
          width: 100%; height: 1px;
          background: rgba(255,255,255,0.05);
        }

        .left-bar {
          position: absolute;
          left: 80px; top: 0;
          width: 4px; height: 0%;
          background: #fff;
          animation: lineGrow 0.8s ease forwards 0.4s;
        }

        .cross-h, .cross-v {
          position: absolute;
          background: rgba(255,255,255,0.08);
          opacity: 0;
          animation: geoIn 0.6s ease forwards 1.6s;
        }
        .cross-h {
          right: 200px; top: 80px;
          width: 120px; height: 2px;
        }
        .cross-v {
          right: 258px; top: 22px;
          width: 2px; height: 120px;
        }

        .hollow-sq {
          position: absolute;
          right: 80px; bottom: 40px;
          width: 60px; height: 60px;
          border: 2px solid rgba(255,255,255,0.12);
          opacity: 0;
          animation: geoIn 0.6s ease forwards 1.8s;
        }

        .filled-sq {
          position: absolute;
          right: 110px; bottom: 70px;
          width: 20px; height: 20px;
          background: #fff;
          opacity: 0;
          animation: geoIn 0.5s ease forwards 2s;
        }

        .circle-outline {
          position: absolute;
          right: 380px; top: 40px;
          width: 48px; height: 48px;
          border: 2px solid rgba(255,255,255,0.1);
          border-radius: 50%;
          opacity: 0;
          animation: geoIn 0.5s ease forwards 1.9s;
        }

        .dot {
          position: absolute;
          width: 6px; height: 6px;
          border-radius: 50%;
          background: #fff;
          opacity: 0;
        }
        .dot-1 {
          right: 170px; bottom: 58px;
          animation: geoIn 0.4s ease forwards 2.1s;
        }
        .dot-2 {
          right: 170px; bottom: 78px;
          animation: geoIn 0.4s ease forwards 2.2s;
        }
        .dot-3 {
          right: 190px; bottom: 58px;
          animation: geoIn 0.4s ease forwards 2.3s;
        }

        .diag-line {
          position: absolute;
          right: 320px; bottom: 20px;
          width: 100px; height: 2px;
          background: rgba(255,255,255,0.08);
          transform: rotate(-35deg);
          transform-origin: right center;
          opacity: 0;
          animation: geoIn 0.5s ease forwards 2s;
        }

        .bottom-bar {
          position: absolute;
          left: 120px; bottom: 40px;
          width: 0px; height: 2px;
          background: rgba(255,255,255,0.15);
          animation: barExpand 0.6s ease forwards 1.5s;
        }

        .circle-lg {
          position: absolute;
          right: 120px; top: 60px;
          width: 140px; height: 140px;
          border: 1px solid rgba(255,255,255,0.06);
          border-radius: 50%;
          opacity: 0;
          animation: geoIn 0.8s ease forwards 1.4s;
        }

        .name {
          position: absolute;
          left: 120px; top: 80px;
          font-size: 96px;
          font-weight: 700;
          letter-spacing: -3px;
          color: #fff;
          line-height: 1;
          opacity: 0;
          transform: translateY(20px);
          animation: textReveal 0.8s ease forwards 0.7s;
        }

        .rule {
          position: absolute;
          left: 120px; top: 195px;
          width: 0px; height: 2px;
          background: #fff;
          animation: ruleExpand 0.6s ease forwards 1.2s;
        }

        .meta {
          position: absolute;
          left: 120px; top: 215px;
          font-size: 14px;
          font-weight: 400;
          letter-spacing: 4px;
          text-transform: uppercase;
          color: rgba(255,255,255,0.5);
          opacity: 0;
          animation: textReveal 0.8s ease forwards 1.4s;
        }

        @keyframes gridFadeIn { to { opacity: 1; } }
        @keyframes lineGrow { to { height: 100%; } }
        @keyframes textReveal { to { opacity: 1; transform: translateY(0); } }
        @keyframes ruleExpand { to { width: 340px; } }
        @keyframes geoIn { to { opacity: 1; } }
        @keyframes barExpand { to { width: 180px; } }
      </style>

      <div class="canvas">
        <div class="grid">
          <div class="gv" style="left:80px;"></div>
          <div class="gv" style="left:280px;"></div>
          <div class="gv" style="left:480px;"></div>
          <div class="gv" style="left:680px;"></div>
          <div class="gv" style="left:880px;"></div>
          <div class="gv" style="left:1080px;"></div>
          <div class="gv" style="left:1280px;"></div>
          <div class="gh" style="top:64px;"></div>
          <div class="gh" style="top:128px;"></div>
          <div class="gh" style="top:192px;"></div>
          <div class="gh" style="top:256px;"></div>
        </div>

        <div class="left-bar"></div>

        <div class="name">Atip K.</div>
        <div class="rule"></div>

        <div class="bottom-bar"></div>

        <div class="circle-lg"></div>
        <div class="circle-outline"></div>
        <div class="cross-h"></div>
        <div class="cross-v"></div>
        <div class="hollow-sq"></div>
        <div class="filled-sq"></div>
        <div class="diag-line"></div>
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
      </div>
    </div>
  </foreignObject>
</svg>
